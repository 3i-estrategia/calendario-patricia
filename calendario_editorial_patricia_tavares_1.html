<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f3;padding:20px;color:#2C3E50}

.contador{font-size:12px;color:#999;margin-left:auto}
.grid{display:flex;flex-direction:column;gap:8px}

.badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}

.badge-tipo-CARROSSEL{background:#E6F1FB;color:#0C447C}

.badge-funil-MEIO{background:#EAF3DE;color:#27500A}
.badge-funil-FUNDO{background:#FCEBEB;color:#791F1F}

.badge-cat-DESEJO{background:#EAF3DE;color:#27500A}

.badge-cat-OBJEÇÃO{background:#FAEEDA;color:#633806}

.campo-valor.gancho{font-style:italic;color:#666;border-left:2px solid #e0e0da;padding-left:10px}

.lista-conteudo{list-style:none;padding:0}

.slides-wrap{display:flex;flex-direction:column;gap:6px}

.slide-num{font-size:10px;color:#aaa;margin-bottom:2px}

.slide-corpo{font-size:12px;color:#666;line-height:1.45}
.sem-resultados{text-align:center;padding:40px 20px;color:#aaa;font-size:14px}
.toggle-btn{font-size:11px;color:#666;cursor:pointer;border:0.5px solid #ccc;background:#f5f5f3;padding:3px 10px;border-radius:6px}
.toggle-btn:hover{background:#e8e8e4}
.sep{height:0.5px;background:#e0e0da;margin:10px 0}
.etiq-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.etiq-pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;cursor:pointer;border:0.5px solid transparent}

<script>
const etiquetaCores={
  "Aguardando":["#F1EFE8","#444441","#D3D1C7"],
  "Aprovado":["#EAF3DE","#27500A","#C0DD97"],
  "Gravado":["#9FE1CB","#085041","#5DCAA5"],
  "Ajustar":["#FAEEDA","#633806","#FAC775"],
  "Cancelado":["#FCEBEB","#791F1F","#F7C1C1"],
  "Em Produção":["#EEEDFE","#3C3489","#CECBF6"],
  "Programado":["#E6F1FB","#0C447C","#B5D4F4"],
};
const etiquetaOpts=["Aguardando","Aprovado","Gravado","Ajustar","Cancelado","Em Produção","Programado"];

const reels=[
  {num:"R01",sem:"Semana 1",funil:"TOPO",cat:"DOR",dia:"Segunda",nome:"A casa que parece sua mas não é",headline:"Você decorou, reformou, investiu - e a casa ainda parece de outra pessoa. Isso tem uma causa.",gancho:"Você já parou pra perceber que a sua casa poderia ser de qualquer pessoa? Nenhum detalhe que conte quem você é, nenhum canto que seja realmente seu. Isso não é falta de gosto. É falta de escuta.",conteudo:["A decoração moderna ensina a copiar referências","O resultado são casas que parecem catálogos, não lares","Casa com identidade começa antes de qualquer escolha de cor ou móvel","Começa com uma pergunta: quem é a pessoa que mora aqui?","Neuroarquitetura estuda exatamente isso - e transforma a resposta em espaço"],cta:"Me conta nos comentários: tem algum cômodo na sua casa que parece realmente seu? O que ele tem de diferente?"},
  {num:"R02",sem:"Semana 1",funil:"TOPO",cat:"DESEJO",dia:"Quarta",nome:"Entrar em casa e sentir alívio de verdade",headline:"Você sabe aquela sensação de entrar num lugar e querer ficar? Sua casa deveria ser assim.",gancho:"Você já entrou num hotel, na casa de alguém, num restaurante - e sentiu imediatamente que queria ficar? Uma calma que não sabe explicar? Isso não é coincidência. É neuroarquitetura funcionando.",conteudo:["Ambientes bem projetados ativam o sistema nervoso de forma diferente","Luz, textura, proporção e identidade criam essa sensação de acolhimento","Não é sobre ter casa bonita - é sobre ter casa que cuida de você","O seu cérebro responde ao espaço antes de você perceber conscientemente","Quando o projeto começa por você, esse alívio acontece toda vez que você abre a porta"],cta:"Me conta: qual foi o último espaço onde você sentiu esse acolhimento imediato? O que ele tinha?"},
  {num:"R03",sem:"Semana 1",funil:"MEIO",cat:"AUTORIDADE",dia:"Domingo",nome:"O que a neurociência diz sobre o espaço onde você vive",headline:"Seu espaço está afetando seu humor, seu sono e sua ansiedade agora mesmo. Isso é ciência.",gancho:"Passamos 90% do tempo em ambientes internos. Se esse ambiente não foi projetado para o seu bem-estar, ele está trabalhando contra você - e você provavelmente nem percebe.",conteudo:["Neuroarquitetura une arquitetura, neurociência e psicologia","Ambientes desorganizados sobrecarregam o córtex pré-frontal e aumentam ansiedade","Luz natural regula o ritmo circadiano - falta dela afeta humor, energia e sono","Elementos naturais reduzem cortisol comprovadamente","O ambiente físico é parte do tratamento - não luxo, necessidade"],cta:"Qual cômodo da sua casa mais te incomoda? Me conta nos comentários que eu explico o que pode estar acontecendo."},
  {num:"R04",sem:"Semana 1",funil:"TOPO",cat:"DOR",dia:"Quinta",nome:"A iluminação que fica linda na foto e péssima na prática",headline:"Você pediu iluminação indireta porque ficou linda em tudo que você viu. Na prática, algo não funciona.",gancho:"Toda manhã você se maquia no banheiro porque a iluminação da sua bancada não serve. Você comprou a iluminação indireta que viu no Instagram e ficou linda - mas na prática, você mal consegue se ver.",conteudo:["Iluminação indireta cria atmosfera mas não ilumina o rosto","Para maquiagem, leitura, trabalho: ela sozinha não serve","Projeto de iluminação inteligente tem três camadas: ambiente, tarefa e destaque","Cada cômodo tem uma função - a iluminação precisa servir essa função","Erro de iluminação é um dos mais caros de corrigir depois da obra"],cta:"Você tem iluminação indireta em casa? Me conta se ela funciona ou te atrapalha no dia a dia."},
  {num:"R05",sem:"Semana 2",funil:"TOPO",cat:"DOR",dia:"Segunda",nome:"Por que você enjoa da sua casa a cada dois anos",headline:"Você refez a sala, trocou os móveis, seguiu a tendência - e dois anos depois quer mudar tudo de novo.",gancho:"Você sabe aquela sensação de decorar a casa inteira e dois anos depois achar que ficou velha? Não é falta de gosto. É porque tendência não é identidade.",conteudo:["Tendência tem data de validade - identidade não","Quando você decora com base no que está na moda, a casa envelhece com a moda","Casa com identidade real foi construída a partir de quem você é","Ela não fica velha porque você não envelhece da mesma forma que a moda","O processo começa com escuta - não com paleta de cores"],cta:"Quantas vezes você já reformou o mesmo cômodo? Me conta aqui."},
  {num:"R06",sem:"Semana 2",funil:"MEIO",cat:"DESEJO",dia:"Quarta",nome:"O espaço de make que finalmente funciona",headline:"O cantinho de make mais comentado aqui. Hoje eu explico o que faz ele funcionar de verdade - não só na foto.",gancho:"Você viu o espaço de make perfeito, organizadinho, bem iluminado, com espelho lindo. Mas na prática você sabe que a maioria fica ótimo pra foto e horrível pra usar. Vou te mostrar a diferença.",conteudo:["Iluminação frontal na altura do rosto - não indireta no teto","Espelho na proporção certa para a distância de uso","Bancada na altura ergonômica para sentada ou em pé","Cores neutras ao redor do espelho para não distorcer a percepção da pele","Organização que deixa o que você usa todo dia acessível - não guardado"],cta:"Como é seu espaço de make hoje? Tem iluminação certa ou você sofre com isso toda manhã?"},
  {num:"R07",sem:"Semana 2",funil:"MEIO",cat:"AUTORIDADE",dia:"Domingo",nome:"Biofilia: por que plantas em casa não são só estética",headline:"Você coloca plantas porque ficam bonitas. O que acontece no seu cérebro vai muito além disso.",gancho:"Pacientes em hospitais com janelas e vegetação se recuperam 30% mais rápido. Isso não é decoração. É biologia.",conteudo:["Biofilia é nossa necessidade inata de contato com a natureza","Nosso cérebro passou milhões de anos em ambientes naturais - as cidades são recentes","Plantas, madeira, pedra e fibras naturais reduzem cortisol comprovadamente","Não é preciso musgo na parede - é preciso intenção biofílica no projeto","Cada elemento natural que entra no espaço é reconexão, não decoração"],cta:"Você tem plantas em casa? Me conta quais e se você percebe diferença no cômodo onde elas estão."},
  {num:"R08",sem:"Semana 2",funil:"TOPO",cat:"DOR",dia:"Quinta",nome:"Casa bagunçada, mente bagunçada",headline:"Você chega em casa cansada e a cabeça não para. O espaço pode estar aumentando esse cansaço.",gancho:"Você já reparou que em alguns ambientes você consegue descansar e em outros a cabeça continua acelerada? Isso não é coincidência - é o seu sistema nervoso respondendo ao que está em volta.",conteudo:["Excesso visual sobrecarrega o córtex pré-frontal mesmo em descanso","Ambientes caóticos aumentam cortisol - o hormônio do estresse","Organização visual não é minimalismo - é intenção no que fica à vista","O cérebro gasta energia processando o ambiente o tempo todo, sem parar","Clareza visual = clareza mental. Isso é comprovado pela neurociência"],cta:"Tem algum espaço na sua casa que te cansa só de olhar pra ele? Me conta o que tem nele."},
  {num:"R09",sem:"Semana 3",funil:"TOPO",cat:"DOR",dia:"Segunda",nome:"Moro em casa que parece fria e não sei por onde começar",headline:"Porcelanato cinza, paredes brancas, sem calor nenhum. E você não pode reformar agora. O que fazer?",gancho:"Esse foi o comentário mais repetido aqui. Minha casa tem porcelanato cinza e paredes brancas e não consigo dar calor. Não posso pintar por enquanto. O que eu faço? Hoje eu respondo.",conteudo:["Piso frio + parede branca = ausência de temperatura visual","A estratégia não é mudar o que é fixo - é criar camadas de calor sobre ele","Tapete de fibra natural ou tons terrosos: muda imediatamente a leitura do ambiente","Madeira em qualquer elemento: ela aquece qualquer acabamento base","Iluminação pontual, não só plafon central: cria aconchego sem obra"],cta:"Sua casa tem esse acabamento? Me conta qual elemento você ainda não tem e eu te falo por onde começar."},
  {num:"R10",sem:"Semana 3",funil:"MEIO",cat:"DESEJO",dia:"Quarta",nome:"Paleta de cores quentes para cada cômodo",headline:"A paleta 3 foi a favorita aqui. Hoje eu mostro ela aplicada na sala, no quarto e na cozinha.",gancho:"Você viu a paleta, amou, salvou - mas na hora de aplicar na sua casa você trava. Porque não basta saber as cores. Precisa saber como cada uma funciona em cada função do espaço.",conteudo:["Sala: tons terrosos no tapete e almofadas, madeira no móvel principal, verde nas plantas","Quarto: mesma paleta em versão mais suave - o quarto precisa comunicar descanso","Cozinha: terracota apagado em azulejo ou detalhe, madeira nos armários","A lógica é sempre a mesma: terra, verde, madeira. A intensidade muda conforme a função","Quartzito Taj Mahal com marcenaria em tom natural: calor com leveza"],cta:"Qual cômodo você quer transformar primeiro? Me conta que eu te ajudo a pensar a paleta."},
  {num:"R11",sem:"Semana 3",funil:"FUNDO",cat:"AUTORIDADE",dia:"Domingo",nome:"Como funciona o processo de neuroarquitetura na prática",headline:"Antes de qualquer decisão de cor, material ou iluminação, existe uma etapa que muda tudo.",gancho:"A maioria dos projetos começa pela estética. O meu começa por uma conversa. Não sobre o que você quer na casa - sobre quem você é.",conteudo:["Primeira pergunta: como você vive, não o que você quer","Rotina, horários, família, sensibilidades, memórias afetivas","Só depois dessas respostas é que qualquer decisão de projeto faz sentido","O mesmo apartamento, para duas pessoas diferentes, gera projetos completamente diferentes","Identidade no espaço não se descobre numa loja - se descobre numa conversa profunda"],cta:"Se você pudesse descrever em uma frase como quer se sentir na sua casa, qual seria? Me conta aqui."},
  {num:"R12",sem:"Semana 3",funil:"TOPO",cat:"DOR",dia:"Quinta",nome:"Você não tem mal gosto. Você nunca foi ouvida.",headline:"Você acha que não tem jeito com decoração. Mas o problema não é você.",gancho:"Eu ouço isso toda semana: não tenho jeito com decoração, não sei o que quero, quando vejo fica bonito mas na minha casa não funciona. Isso não é falta de talento. É falta de processo.",conteudo:["Gosto pessoal existe em todo mundo - o problema é que raramente alguém para para perguntar qual é","Decoração baseada em referências externas cria ambientes sem identidade","Quando ninguém pergunta quem você é, o espaço não pode ser seu","Não é falta de gosto. É que você nunca teve um projeto pensado pra você","O processo de descoberta existe para isso - e começa com escuta, não com paleta"],cta:"Você já se sentiu assim? Me conta nos comentários."},
  {num:"R13",sem:"Semana 4",funil:"TOPO",cat:"DOR",dia:"Segunda",nome:"A sala instagramável que ninguém usa",headline:"Ficou linda na foto, ficou bonita pra visita. Mas você nunca senta nela de verdade.",gancho:"Você tem uma sala que todo mundo elogia quando entra, mas que você mesma não usa no dia a dia. O sofá está sempre perfeitinho porque ninguém senta. Isso não é casa. É cenário.",conteudo:["Projeto que começa pela estética cria espaços pra postar, não pra viver","Casa que serve pra vida real é projetada para a rotina de quem mora ali","O sofá mais bonito no lugar errado é um sofá que não funciona","Neuroarquitetura projeta para o uso, não para a foto","Quando o espaço serve pra você, você para de querer sair de casa"],cta:"Você tem casa para postar ou para viver? Me conta com honestidade."},
  {num:"R14",sem:"Semana 4",funil:"MEIO",cat:"DESEJO",dia:"Quarta",nome:"Como criar aconchego sem reformar nada",headline:"Você não precisa reformar tudo para mudar como a sua casa te faz sentir. Precisa de intenção.",gancho:"A crença de que é preciso esperar a reforma grande para cuidar do espaço é uma das mais caras de todas - porque mantém você vivendo em desconforto por anos desnecessariamente.",conteudo:["Uma luminária diferente pode mudar a temperatura visual inteira do ambiente","Tapete, manta, almofadas em material natural: aconchego sem obra","Organização visual: retirar o excesso já reduz a ansiedade do espaço","Plantas de folhagem generosa: presença, vida e biofilia sem reformar","Intenção no espaço não tem preço fixo - tem clareza sobre o que mudar primeiro"],cta:"Qual dessas mudanças você consegue fazer essa semana? Me conta."},
  {num:"R15",sem:"Semana 4",funil:"FUNDO",cat:"AUTORIDADE",dia:"Domingo",nome:"O que muda quando o espaço é projetado para você",headline:"Veja o que acontece quando o projeto começa pela identidade de quem vai morar, não pela estética.",gancho:"Davi tinha 5 anos e não dormia no próprio quarto. O quarto foi refeito com neuroarquitetura. Depois da entrega, a mãe nos mandou uma mensagem: ele passou a dormir sozinho.",conteudo:["Quarto infantil setorizado: espaço de dormir, brincar, estudar e guardar claramente definidos","O cérebro da criança precisa entender onde está para saber o que fazer","Iluminação de 3.000K na área lúdica: temperatura que comunica calma","Painel de escalada, livros acessíveis, cores brandas: ambiente que respeita quem mora ali","Resultado: segurança. E a criança passou a dormir no próprio quarto"],cta:"Seu filho tem quarto setorizado? Me conta como é o espaço dele hoje."},
  {num:"R16",sem:"Semana 4",funil:"TOPO",cat:"DOR",dia:"Quinta",nome:"Você entrou em casa hoje e relaxou de verdade?",headline:"Se a resposta for não - e for sempre assim - o espaço pode estar trabalhando contra você.",gancho:"Chegou em casa depois de um dia longo. Entrou, trocou de roupa, se jogou no sofá. E a cabeça continuou acelerada. Isso acontece toda vez?",conteudo:["Sinais de que seu lar não está te apoiando:","Você prefere sair de casa a ficar nela","A primeira vontade ao entrar é de arrumar ou limpar","Você cansa mais em casa do que fora","Você dorme mal mesmo sem estresse aparente"],cta:"Você reconhece algum desses sinais? Me conta com honestidade."},
  {num:"R17",sem:"Semana 5",funil:"TOPO",cat:"DOR",dia:"Segunda",nome:"A reforma que saiu mais cara do que o projeto que você achou caro",headline:"Todo mundo parcela o móvel planejado sem questionar. Mas trava no preço do projeto.",gancho:"O que eu ouço com frequência: o que eu tenho medo é do preço. Todo mundo parcela os móveis planejados e tá ok com isso, mas o preço do projeto ainda é um obstáculo.",conteudo:["O projeto não é o custo extra - é o que evita o erro caro","Marcenaria executada com medidas erradas: custo do retrabalho","Iluminação colocada no lugar errado: não tem como mudar depois","Em Campinas, marcenaria começa em 30 mil. O projeto que evita erro é fração disso","O único item que pode ser refeito antes de qualquer execução é o projeto"],cta:"Você já teve algum problema numa reforma por falta de projeto? Me conta."},
  {num:"R18",sem:"Semana 5",funil:"MEIO",cat:"DESEJO",dia:"Quarta",nome:"A varanda que ninguém usava virou o cômodo favorito",headline:"O espaço que estava sendo desperdiçado se tornou o lugar que toda a família quer estar.",gancho:"Você tem algum cômodo da sua casa que ninguém usa? Uma varanda esquecida, um quarto que só serve para guardar coisas? Esse espaço pode se tornar o seu lugar favorito.",conteudo:["Espaços abandonados geralmente foram projetados sem escuta de quem mora ali","Uma varanda se torna favorita quando recebe identidade: iluminação, textura, planta, assento certo","Não é sobre reformar - é sobre intencionar o espaço para quem vai usar","O erro mais comum: projetar pela planta, não pela rotina","Quando o espaço serve pra você, você para de evitá-lo e passa a habitá-lo"],cta:"Qual é o cômodo da sua casa que você mais evita hoje? Me conta."},
  {num:"R19",sem:"Semana 5",funil:"FUNDO",cat:"AUTORIDADE",dia:"Domingo",nome:"Setorização cognitiva: o que é e por que muda tudo",headline:"Seu quarto pode estar confundindo seu cérebro e prejudicando seu sono. Tem solução.",gancho:"O cérebro aprende por associação. Quando você trabalha, assiste série, come e dorme no mesmo espaço, ele não sabe mais o que deve fazer ali.",conteudo:["Setorização cognitiva é organizar o espaço para que cada área comunique uma função diferente","Quarto: área de dormir claramente separada de área de trabalho e entretenimento","Iluminação diferente para cada setor: o cérebro usa a luz como sinal para mudar de modo","Textura e mobiliário diferentes para cada zona reforçam a separação cognitiva","Resultado: você passa a descansar mais porque o espaço comunica que é hora de descansar"],cta:"Você trabalha no quarto? Me conta como está organizado o espaço onde você dorme."},
  {num:"R20",sem:"Semana 5",funil:"TOPO",cat:"DOR",dia:"Quinta",nome:"Sua ansiedade pode começar na sua sala",headline:"Ambientes super-estimulantes aumentam a ansiedade. O Brasil é o país com mais ansiosos do mundo.",gancho:"Quase 10% da população brasileira tem ansiedade. E passamos 90% do tempo em ambientes internos. Isso não é coincidência.",conteudo:["Ambientes caóticos e super-estimulantes ativam o sistema nervoso constantemente","Excesso de objetos, padrões conflitantes, cores muito saturadas: tudo isso estresa","Você não consegue descansar num espaço que está gritando para o seu cérebro","Reduzir estímulos visuais é uma forma de reduzir ansiedade sem remédio","O espaço bem projetado é parte do cuidado com a saúde mental"],cta:"Você já pensou que a sua casa pode estar contribuindo para a sua ansiedade? Me conta o que você sente em casa."},
  {num:"R21",sem:"Semana 6",funil:"TOPO",cat:"DOR",dia:"Segunda",nome:"Você decora mas a casa ainda não parece sua",headline:"Você já comprou muita coisa pra casa. Mas algo ainda não encaixa. Isso tem um nome.",gancho:"Você comprou o tapete que viu no Pinterest, as plantas, o sofá do jeito certo. A sala ficou bonita. Mas quando você senta nela, algo não encaixa.",conteudo:["Decoração baseada em referências externas cria ambientes genéricos","A peça bonita no lugar errado não serve ao espaço","Casa que parece sua tem elementos que contam quem você é","Não é sobre ter mais coisas - é sobre ter as coisas certas para você","O processo que cria identidade começa pela escuta, não pela compra"],cta:"Me conta: tem algum cômodo na sua casa onde você realmente se sente bem? O que ele tem de diferente?"},
  {num:"R22",sem:"Semana 6",funil:"MEIO",cat:"DESEJO",dia:"Quarta",nome:"O quarto que a criança ama porque foi feito pra ela",headline:"Não o quarto que os pais queriam. O quarto que a criança escolheu com orientação certa.",gancho:"Quarto de criança bem projetado não é o mais bonito. É o que a criança reconhece como dela.",conteudo:["Ouvir a criança é o primeiro passo - não é opcional","Cada setor do quarto comunica uma função: dormir, brincar, estudar, guardar","Cores brandas para crianças agitadas: o ambiente também pode acalmar","Textura, escala dos móveis e altura acessível: tudo pensado para o corpo dela","Casa na árvore, painel de escalada, livros acessíveis: identidade real no espaço"],cta:"Seu filho ama o quarto dele ou só dorme lá? Me conta como é o espaço."},
  {num:"R23",sem:"Semana 6",funil:"MEIO",cat:"AUTORIDADE",dia:"Domingo",nome:"Por que não faço showroom. Faço lar.",headline:"Meu trabalho não é criar um espaço que impressione. É criar um espaço que cuide.",gancho:"Existe uma diferença clara entre projeto bonito e projeto que funciona para quem mora. Eu decidi há muito tempo que o meu trabalho é o segundo.",conteudo:["Showroom impressiona visita. Lar cuida de quem mora.","O processo começa com escuta profunda antes de qualquer decisão técnica","Não é o que é bonito pra mim - é o que faz sentido pra identidade de quem vai viver ali","Design afetivo: ancestralidade, memória, pertencimento dentro do espaço","Cada projeto meu é único porque cada pessoa que mora nele é única"],cta:"Quando você entra na sua casa, ela parece sua ou parece um catálogo? Me conta."},
  {num:"R24",sem:"Semana 6",funil:"FUNDO",cat:"DOR",dia:"Quinta",nome:"Sua casa está moldando você sem você perceber",headline:"Estamos moldando nossos ambientes para nossas necessidades - ou apenas nos adaptando a eles?",gancho:"Você está vivendo numa casa que foi feita pra você? Ou você está se adaptando a uma casa que foi feita sem te perguntar nada?",conteudo:["A maioria das pessoas adapta o comportamento ao espaço, não o contrário","Você aprende a evitar o cômodo que te cansa","O espaço molda o comportamento, o humor, a relação com a família","Quando o ambiente foi projetado para você, essa adaptação não é necessária","A casa que cuida de você existe - começa por uma conversa sobre quem você é"],cta:"Você molda sua casa ou sua casa molda você? Me conta nos comentários."},
  {num:"R25",sem:"Semana 7",funil:"TOPO",cat:"DOR",dia:"Segunda",nome:"Casa pequena também pode ter identidade",headline:"Você está adiando o projeto porque acha que a casa é pequena demais. Isso está te custando bem-estar.",gancho:"Quando eu tiver uma casa maior, aí vou investir em projeto. Essa frase já atrasou anos de qualidade de vida de muita gente. O tamanho nunca foi o problema.",conteudo:["Metro quadrado não define bem-estar - intenção define","Apartamento pequeno bem projetado cria mais qualidade de vida que casa grande mal organizada","O problema raramente é o espaço. É a falta de setorização e de identidade","O cérebro responde ao ambiente, não ao tamanho dele","Começar agora com o que você tem já muda como você se sente em casa"],cta:"Qual o tamanho do seu espaço atual e o que mais te incomoda nele? Me conta."},
  {num:"R26",sem:"Semana 7",funil:"MEIO",cat:"DESEJO",dia:"Quarta",nome:"Madeira, pedra e verde: a combinação que aquece qualquer ambiente",headline:"Existe uma combinação de materiais que o cérebro lê como acolhimento. Independente do acabamento base.",gancho:"Não importa se o seu piso é frio, se as paredes são brancas ou se o apartamento é padrão construtora. Essa combinação transforma o espaço - porque é biológica, não estética.",conteudo:["Madeira com veio aparente: o cérebro reconhece matéria orgânica e responde com relaxamento","Pedra natural (quartzito, mármore): solidez e permanência em doses certas","Verde (plantas de folhagem generosa): reconexão com natureza, redução de cortisol","Fibras naturais (palha, ratan, juta): leveza e calor ao mesmo tempo","A combinação inteligente desses três é o que separa ambiente completo de ambiente que parece faltar algo"],cta:"Qual dos três você tem em casa? Me conta o que ainda falta."},
  {num:"R27",sem:"Semana 7",funil:"FUNDO",cat:"AUTORIDADE",dia:"Domingo",nome:"O que acontece quando você é ouvida de verdade num projeto",headline:"Quando o arquiteto pergunta da sua infância antes de desenhar uma parede, algo muda.",gancho:"A maioria dos clientes acha estranho na primeira conversa. Porque eu não começo pelo projeto - começo por perguntas que parecem não ter nada a ver. E é exatamente aí que está tudo.",conteudo:["Perguntas sobre rotina, família, memórias afetivas, o que você evita, o que te recarrega","Só depois dessas respostas é que qualquer decisão de material, cor ou luz faz sentido","Design afetivo: a casa carrega quem mora nela - não o estilo do arquiteto","Quando você foi ouvida, o espaço responde com pertencimento","E pertencimento é o que faz você entrar pela porta e sentir que chegou"],cta:"Você já foi ouvida de verdade num projeto? Como foi essa experiência? Me conta."},
  {num:"R28",sem:"Semana 7",funil:"TOPO",cat:"DOR",dia:"Quinta",nome:"O cômodo que você evita na sua própria casa",headline:"Todo mundo tem um. Aquele cômodo que você entra e sente uma agonia que não sabe explicar.",gancho:"Você já entrou num ambiente e sentiu uma agonia imediata - e não conseguiu explicar por quê? O sistema nervoso lê o espaço antes do consciente.",conteudo:["Teto baixo, excesso de objetos, iluminação agressiva: o corpo responde antes da mente","Cores saturadas e contrastes excessivos estressam o sistema visual","Ausência de natureza aumenta artificialidade e distância emocional","Desordem: o cérebro gasta energia tentando criar ordem onde não existe","Essa agonia não é frescura - é sinal de que o ambiente não foi projetado pra você"],cta:"Qual cômodo você mais evita na sua casa? Me conta o que você sente lá dentro."},
  {num:"R29",sem:"Semana 8",funil:"FUNDO",cat:"DOR",dia:"Segunda",nome:"Você investiu na reforma mas ainda não ficou certo",headline:"Você gastou. O resultado ficou bonito. Mas algo ainda não encaixa.",gancho:"A reforma foi grande. A marcenaria ficou linda. Mas quando você entra, ainda sente que falta algo. Isso tem um nome: é projeto sem escuta.",conteudo:["Projeto bonito sem identidade cria espaço esteticamente correto e emocionalmente neutro","Não é o material errado. É a ausência de quem mora ali dentro das decisões","Você pode reformar com os melhores materiais e ainda assim a casa não parecer sua","A diferença entre uma reforma que resolve e uma que não resolve é o processo que a antecede","Começa com uma conversa, não com uma paleta de cores"],cta:"Você já investiu em algo pra casa que ficou lindo mas ainda não resolveu a sensação? Me conta."},
  {num:"R30",sem:"Semana 8",funil:"FUNDO",cat:"DESEJO",dia:"Quarta",nome:"Como seria a sua casa se ela fosse feita pra você",headline:"Imagine entrar em casa e sentir que cada detalhe foi pensado pra você. Não pra mais ninguém.",gancho:"Fecha os olhos por um segundo. Como seria entrar em casa e sentir que cada detalhe é seu - não do arquiteto, não da loja, não da tendência. Seu. Isso não é utopia.",conteudo:["As cores que te acalmam, não as que estão na moda","Os materiais que você ama tocar","A luz que faz você se sentir bem em cada hora do dia","Espaço para a sua rotina real - não para como deveria ser","Elementos que contam sua história"],cta:"Me conta: como você quer se sentir quando entra na sua casa? Em uma frase."},
];

const carrosseis=[
  {num:"C01",sem:"Semana 1",funil:"TOPO",cat:"DOR",dia:"Quinta",titulo:"Compensa ou não compensa ter arquiteto?",sub:"Tem muita coisa que as pessoas acham que um arquiteto faz - e não é bem assim.",slides:[{t:"Compensa ou não compensa?",c:"Existe um labirinto de opiniões sobre contratar arquiteto. Eu te falo o que vale a pena na minha visão e o que não passa de mito."},{t:"Escolher cor de parede ❌ Não é só isso!",c:"Todo mundo acha que arquiteto serve pra isso. Mas a escolha de cor é literalmente o último passo do processo."},{t:"Fazer projeto de planta ✅ Aqui começa de verdade",c:"Antes de qualquer material ou cor: o projeto espacial. Circulação, setorização, proporção. Isso define se a casa vai funcionar ou não."},{t:"Fazer o que você quer ❌ Isso não existe",c:"Arquiteto que faz o que o cliente quer sem escuta profunda entrega estética, não identidade."},{t:"Escutar quem mora ali ✅ Isso é o diferencial real",c:"O processo que transforma espaço em lar começa por perguntas sobre rotina, memória afetiva e identidade."},{t:"Deixar a casa bonita ❌ Bonito é consequência",c:"A estética é resultado de um processo, não o objetivo. Quando a estética é o objetivo, você tem showroom."},{t:"Fazer sua casa cuidar de você ✅ Isso sim.",c:"Neuroarquitetura projeta para o bem-estar de quem vive no espaço."},{t:"Agora me fala: você já contratou um arquiteto? O que você mais valorizou no processo? Me conta aqui nos comentários! 👇",c:""}]},
  {num:"C02",sem:"Semana 1",funil:"TOPO",cat:"DOR",dia:"Sábado",titulo:"O lar dos seus sonhos: compensa ou não?",sub:"Tem elementos que valem cada centavo. E tem os que você vai enjoar em dois anos.",slides:[{t:"Compensa ou não compensa?",c:"Eu te falo o que realmente faz diferença na vida real - e o que é pura ilusão de catálogo."},{t:"Plantas em casa ✅ Vale muito a pena",c:"Não é decoração. É biologia. Plantas reduzem cortisol."},{t:"Tapete de fibra natural ✅ Muda imediatamente",c:"É o elemento mais subestimado. Ele ancora o espaço, cria calor visual."},{t:"Tendência de cor do ano ❌ Cuidado aqui!",c:"Tendência tem data de validade. Casa decorada só com o que está na moda envelhece junto."},{t:"Madeira em algum elemento ✅ Aquece qualquer ambiente",c:"Clara ou escura, maciça ou revestimento - madeira aquece qualquer acabamento base."},{t:"Muitos objetos decorativos ❌ Reavalie",c:"Excesso visual sobrecarrega o cérebro."},{t:"Iluminação pontual ✅ Isso transforma",c:"Um pendente, um abajur, uma luminária de chão. Iluminação pontual cria aconchego que o plafon central nunca vai criar."},{t:"Agora me fala: qual desses elementos você ainda não tem em casa? Me conta aqui! 👇",c:""}]},
  {num:"C03",sem:"Semana 1",funil:"TOPO",cat:"AUTORIDADE",dia:"Terça",titulo:"Jeito certo e jeito errado de entender sua casa",sub:"Tem muita informação circulando sobre decoração. Algumas são verdade. Outras são mitos.",slides:[{t:"Jeito errado ❌",c:"Acreditar que casa bonita é sobre tendência."},{t:"Jeito certo ✅",c:"Entender que casa que cuida de você começa por quem você é. Antes da paleta de cores, vem a escuta profunda."},{t:"Jeito errado ❌",c:"Seguir o que está na moda e esperar que a casa pareça sua."},{t:"Jeito certo ✅",c:"Criar a partir das suas vivências, da sua rotina, das suas memórias."},{t:"Jeito errado ❌",c:"Reformar sem entender o que está errado."},{t:"Jeito certo ✅",c:"Entender que o problema raramente é estético. É de identidade, de setorização, de iluminação mal planejada."},{t:"Jeito errado ❌",c:"Achar que arquiteto é luxo e que dá pra fazer sozinha com Pinterest."},{t:"Jeito certo ✅",c:"Entender que um processo com escuta profunda evita anos de reformas que não resolvem."},{t:"Agora me fala: qual desses jeitos errados você já fez? Me conta nos comentários! 👇",c:""}]},
  {num:"C04",sem:"Semana 2",funil:"TOPO",cat:"DOR",dia:"Quinta",titulo:"Coisas que ninguém te conta sobre reforma",sub:"Antes de começar qualquer obra, existem verdades que todo mundo deveria saber.",slides:[{t:"Ninguém te conta isso antes de reformar!",c:"Tem informações que chegam tarde demais."},{t:"Iluminação errada não tem conserto fácil ⚠️",c:"De todos os erros de obra, o de iluminação é um dos mais caros de corrigir."},{t:"Projeto de marcenaria sem medidas precisas ⚠️",c:"Marcenaria executada com medidas aproximadas pode resultar em centímetros que fazem a porta não abrir direito."},{t:"Tendência de material envelhece junto com a moda ⚠️",c:"O que está em alta agora vai parecer datado em alguns anos."},{t:"Reforma sem projeto sai mais cara no final ⚠️",c:"Decisões tomadas durante a obra custam mais do que decisões tomadas antes."},{t:"O que os catálogos mostram raramente é a vida real ⚠️",c:"Sofá branco impecável - isso não é casa, é cenário fotográfico."},{t:"A sensação de casa pronta demora mais do que a obra ⚠️",c:"Obra acaba. Casa com identidade leva tempo."},{t:"Agora me fala: qual dessas verdades você descobriu tarde demais? Me conta nos comentários! 👇",c:""}]},
  {num:"C05",sem:"Semana 2",funil:"TOPO",cat:"DOR",dia:"Sábado",titulo:"O que cada cômodo da sua casa deveria fazer por você",sub:"Cada espaço tem uma função emocional além da prática.",slides:[{t:"Sua casa não é só funcional!",c:"Cada cômodo tem uma função prática - e uma função emocional."},{t:"Sala de estar: acolher",c:"A sala precisa convidar. Não impressionar."},{t:"Quarto: descansar o sistema nervoso",c:"O quarto precisa comunicar descanso antes de você se deitar."},{t:"Cozinha: criar e conectar",c:"Cozinha não é só funcional. É o cômodo onde famílias se reúnem."},{t:"Escritório: foco sem ansiedade",c:"Iluminação adequada, organização visual, ausência de distrações."},{t:"Banheiro: renovar",c:"O banheiro é onde o dia começa e termina."},{t:"Área de lazer: recarregar",c:"Varanda, jardim, quintal. Quando esses espaços têm identidade, você os usa."},{t:"Agora me fala: qual cômodo da sua casa melhor cumpre sua função emocional? Me conta nos comentários! 👇",c:""}]},
  {num:"C06",sem:"Semana 2",funil:"MEIO",cat:"AUTORIDADE",dia:"Terça",titulo:"Segredos que ninguém conta sobre neuroarquitetura",sub:"Algumas verdades. Outras meia-verdade. Vou esclarecer.",slides:[{t:"O segredo que ninguém conta sobre neuroarquitetura:",c:"Como saber o que realmente afeta o seu bem-estar no espaço?"},{t:"Cor de parede resolve ansiedade: mito ❌",c:"Cor importa. Mas ela é um elemento dentro de um sistema."},{t:"Plantas qualquer tamanho: nem sempre ✅⚠️",c:"Planta pequena num canto escuro faz menos diferença do que planta de folhagem generosa num espaço bem iluminado."},{t:"Espaço organizado = espaço caro: mito ❌",c:"Organização visual é sobre intenção, não sobre dinheiro."},{t:"Iluminação quente acalma: verdade ✅",c:"Luz quente (2700K a 3000K) comunica ao cérebro que é hora de relaxar."},{t:"Espelho dobra o espaço: depende ⚠️",c:"Espelho bem posicionado amplia e ilumina. Espelho mal posicionado cria reflexos perturbadores."},{t:"Ambiente simétrico relaxa o cérebro: verdade ✅",c:"O cérebro busca padrão e previsibilidade. Simetria cria sensação de ordem e segurança."},{t:"Agora me fala: alguma dessas te surpreendeu? Me conta nos comentários! 👇",c:""}]},
  {num:"C07",sem:"Semana 3",funil:"TOPO",cat:"DOR",dia:"Quinta",titulo:"Erros que fazem sua casa nunca parecer sua",sub:"Comportamentos de decoração que garantem que a casa nunca vai ter identidade.",slides:[{t:"É possível ter uma casa que parece de outra pessoa?",c:"Sim. E a maioria das pessoas tem. Não porque não tentaram - porque tentaram do jeito errado."},{t:"Erro 1: decorar pela foto ❌",c:"Você salva a referência, compra o tapete parecido. O resultado é uma imitação de outro espaço."},{t:"Erro 2: seguir tendência sem filtro ❌",c:"Tendência é feita para todo mundo ao mesmo tempo. Casa com identidade é feita pra você."},{t:"Erro 3: comprar peças isoladas ❌",c:"Cada peça bonita separada não garante conjunto bonito."},{t:"Erro 4: não saber o que você quer ❌",c:"E ninguém perguntou de forma profunda."},{t:"Erro 5: fazer sem escuta ❌",c:"Projeto feito sem entender a rotina e a identidade de quem mora resulta em espaço emocionalmente vazio."},{t:"Erro 6: esperar a reforma grande ❌",c:"Você pode começar agora. Intenção no espaço não depende de obra."},{t:"Agora me fala: qual desses erros você se identificou? Me conta nos comentários! 👇",c:""}]},
  {num:"C08",sem:"Semana 3",funil:"MEIO",cat:"DESEJO",dia:"Sábado",titulo:"O que eu coloco em todo projeto de lar com identidade",sub:"Elementos que aparecem em todo projeto meu - não porque são tendência, mas porque funcionam.",slides:[{t:"O que nunca falta nos meus projetos:",c:"Não porque está na moda. Porque funciona para o bem-estar de quem mora."},{t:"1. Iluminação em camadas ✅",c:"Ambiental, de tarefa e de destaque. As três juntas."},{t:"2. Elemento de madeira ✅",c:"Clara ou escura, maciça ou revestimento. Madeira aquece qualquer acabamento base."},{t:"3. Biofilia com presença real ✅",c:"Planta de folhagem generosa. Presença da natureza que o cérebro reconhece como reconexão."},{t:"4. Organização visual intencional ✅",c:"O que fica à vista foi escolhido. Clareza visual = clareza mental."},{t:"5. Elemento de identidade pessoal ✅",c:"Um objeto com história, uma textura que a pessoa ama."},{t:"6. Setorização por função ✅",c:"Cada área do espaço comunica o que deve acontecer nela."},{t:"Agora me fala: qual desses elementos você já tem em casa? Me conta aqui nos comentários! 👇",c:""}]},
  {num:"C09",sem:"Semana 3",funil:"FUNDO",cat:"AUTORIDADE",dia:"Terça",titulo:"Antes e depois: o que muda quando o espaço é ouvido",sub:"Não é só visual. É emocional.",slides:[{t:"Antes e depois de verdade:",c:"Não estou falando de antes e depois visual. Estou falando de antes e depois emocional."},{t:"Antes: você evitava o cômodo",c:"Aquele quarto que você só entra para pegar algo."},{t:"Depois: você quer ficar ✅",c:"Quando o espaço tem a sua identidade, você o procura. Ele se torna o lugar de recarregar."},{t:"Antes: a casa te cansava",c:"Chegar em casa e a cabeça não parar."},{t:"Depois: a casa te recarrega ✅",c:"Quando o espaço foi projetado para o seu sistema nervoso, você entra e sente o corpo soltar."},{t:"Antes: você não sabia o que estava errado",c:"A sensação de que falta algo, mas sem conseguir nomear."},{t:"Depois: você sabe o que é seu ✅",c:"O espaço conta quem você é. Você entra e reconhece o lar como extensão de você."},{t:"Agora me fala: qual desses 'antes' você reconhece na sua casa hoje? Me conta nos comentários! 👇",c:""}]},
  {num:"C10",sem:"Semana 4",funil:"TOPO",cat:"DOR",dia:"Quinta",titulo:"Tudo que o Pinterest não te conta sobre decoração",sub:"O Pinterest salvou muita inspiração. E criou muita frustração.",slides:[{t:"O que o Pinterest não te conta:",c:"Salvei tanto. Organizei por pastas. E na hora de aplicar em casa, nada encaixava."},{t:"O que o Pinterest faz bem ✅",c:"Inspira. Mostra possibilidades."},{t:"O que o Pinterest não faz ❌",c:"Não sabe quem você é. Não conhece sua rotina."},{t:"Por que a referência não vira realidade ❌",c:"A foto foi tirada num espaço feito pra outra pessoa."},{t:"O que acontece quando você tenta replicar ❌",c:"A peça chega. O ambiente fica parecido com a foto. Mas ainda sente que falta algo."},{t:"O que funciona de verdade ✅",c:"Usar as referências como ponto de partida para entender o que você valoriza emotivamente."},{t:"A pergunta certa ✅",c:"O que faz meu sistema nervoso descansar? O que me faz sentir que aquele espaço é meu?"},{t:"Agora me fala: quantos pins você tem salvos que nunca usou? Me conta nos comentários! 👇",c:""}]},
  {num:"C11",sem:"Semana 4",funil:"MEIO",cat:"DESEJO",dia:"Sábado",titulo:"Texturas que transformam qualquer ambiente",sub:"Textura é o elemento mais subestimado no projeto de interiores.",slides:[{t:"O segredo que muda tudo sem uma obra:",c:"Seu cérebro processa textura como informação sensorial que vai direto para o sistema emocional."},{t:"Macios e aveludados: acolhimento ✅",c:"Linho, algodão natural, veludo, lã. Materiais que evocam segurança e conforto."},{t:"Madeira com veio: reconexão com natureza ✅",c:"O cérebro reconhece matéria orgânica e responde com relaxamento."},{t:"Pedra natural: solidez e permanência ✅⚠️",c:"Quartzito, mármore, granito comunicam solidez. Em doses certas, equilíbrio."},{t:"Fibras naturais: leveza e calor juntos ✅",c:"Palha, ratan, sisal, juta. Remetem à natureza."},{t:"Metais: depende do acabamento ⚠️",c:"Dourado, bronze, cobre têm calor visual. Cromado e inox são frios."},{t:"A combinação certa é o que separa completo de incompleto ✅",c:"Um ambiente que parece que ainda falta algo quase sempre está com desequilíbrio de texturas."},{t:"Agora me fala: qual tipo de textura você mais tem em casa? Me conta nos comentários! 👇",c:""}]},
  {num:"C12",sem:"Semana 4",funil:"FUNDO",cat:"AUTORIDADE",dia:"Terça",titulo:"Coisas que fazem um lar com identidade - e coisas que destroem",sub:"Tem escolhas que constroem identidade. E tem escolhas que apagam qualquer identidade.",slides:[{t:"O que constrói e o que destrói a identidade de um lar:",c:"Não é questão de bom gosto ou dinheiro. É questão de intenção."},{t:"Constrói: elementos com história pessoal ✅",c:"Itens com memória afetiva criam identidade que nenhuma loja vende."},{t:"Destrói: decoração por kit ❌",c:"Quando tudo combina perfeitamente porque foi comprado junto, o espaço perde personalidade."},{t:"Constrói: cores que você sente como suas ✅",c:"A cor que quando você entra no cômodo você sente que chegou."},{t:"Destrói: neutros por medo de errar ❌",c:"Branco, bege, cinza em tudo. Resultado: espaço seguro e sem alma."},{t:"Constrói: espaço projetado para sua rotina ✅",c:"Casa que funciona para como você vive de verdade."},{t:"Destrói: projeto que ignora quem mora ❌",c:"Quando o arquiteto projeta pelo próprio gosto, está sempre faltando algo."},{t:"Agora me fala: sua casa tem mais elementos que constroem ou que destroem identidade? Me conta nos comentários! 👇",c:""}]},
  {num:"C13",sem:"Semana 5",funil:"TOPO",cat:"DOR",dia:"Quinta",titulo:"Reformas que ninguém precisava fazer",sub:"Obras feitas pela razão errada - e que poderiam ter sido evitadas.",slides:[{t:"Reformas que você não precisava ter feito!",c:"Estou falando de reformas feitas pela razão errada."},{t:"A reforma da tendência ❌",c:"Dois anos depois já enjoou."},{t:"A reforma do diagnóstico errado ❌",c:"O problema continuava. Porque o problema nunca era estético."},{t:"A reforma sem projeto ❌",c:"Mais rápida no início. Mais cara no final."},{t:"A reforma para a visita ❌",c:"Você reformou o que a visita vai ver, não o que você usa todo dia."},{t:"A reforma que não incluiu escuta ❌",c:"O profissional foi excelente tecnicamente. Mas não perguntou quem você era."},{t:"A reforma que poderia ter esperado ❌",c:"O problema não era urgência - era falta de clareza sobre o que estava errado."},{t:"Agora me fala: qual reforma você fez que olhando para trás não precisava? Me conta nos comentários! 👇",c:""}]},
  {num:"C14",sem:"Semana 5",funil:"MEIO",cat:"DESEJO",dia:"Sábado",titulo:"O quarto ideal para cada fase da criança",sub:"Bebê, criança pequena, criança em idade escolar. Cada fase tem necessidades diferentes.",slides:[{t:"Quarto de criança: compensa ou não investir?",c:"A resposta é sim - mas com critério."},{t:"Bebê: para a mãe, também ✅",c:"O quarto precisa favorecer o sono do bebê. Mas precisa também funcionar para a rotina noturna da mãe."},{t:"Criança pequena (2-5 anos): setorização ✅",c:"O cérebro da criança precisa entender o que acontece em cada parte do quarto."},{t:"Criança em idade escolar: foco ✅",c:"Área de estudo com iluminação adequada, separada da área de brincar."},{t:"O que não muda em nenhuma fase ✅",c:"Segurança. Elementos em escala do corpo da criança. Cores que acalmam."},{t:"O que muda mais rápido do que você imagina ⚠️",c:"Tema de personagem. Invista no que atravessa fases."},{t:"O que o Davi ensinou ✅",c:"Quarto setorizado com setorização por zona e identidade real da criança. Resultado: ele passou a dormir sozinho."},{t:"Agora me fala: qual fase seu filho está? Me conta nos comentários! 👇",c:""}]},
  {num:"C15",sem:"Semana 5",funil:"FUNDO",cat:"AUTORIDADE",dia:"Terça",titulo:"O processo que transforma espaço em lar",sub:"Não é sobre material, cor ou estilo. É sobre um processo que começa antes de tudo.",slides:[{t:"Como transforma um espaço em lar de verdade?",c:"Tem tudo a ver com um processo que a maioria dos projetos pula."},{t:"Etapa 1: A reunião de descoberta",c:"Antes de qualquer decisão, uma conversa profunda."},{t:"Etapa 2: Mapeamento sensorial ✅",c:"Entender o que o espaço atual provoca em quem mora nele. O diagnóstico precede o projeto."},{t:"Etapa 3: Projeto de identidade ✅",c:"Só agora entram as decisões técnicas: iluminação, materiais, cores, mobiliário."},{t:"Etapa 4: Execução acompanhada ✅",c:"Com acompanhamento, as decisões de obra são tomadas com critério."},{t:"Etapa 5: A entrega ✅",c:"Não é entrega de projeto - é entrega de lar."},{t:"O que diferencia esse processo ✅",c:"A estética é consequência, não ponto de partida. A escuta antecede o projeto."},{t:"Agora me fala: o que mais te chamou atenção aqui? Me conta nos comentários! 👇",c:""}]},
  {num:"C16",sem:"Semana 6",funil:"TOPO",cat:"DOR",dia:"Quinta",titulo:"Sinais de que sua casa está te fazendo mal",sub:"Seu espaço pode estar afetando seu humor, sono e ansiedade sem você perceber.",slides:[{t:"Sua casa está te fazendo mal?",c:"O ambiente onde você vive afeta seu sistema nervoso o tempo todo."},{t:"Sinal 1: você prefere sair a ficar em casa ⚠️",c:"Quando você planeja a próxima saída enquanto ainda está em casa."},{t:"Sinal 2: a cabeça não para quando você está em casa ⚠️",c:"O cérebro trabalha para processar os estímulos mesmo quando você tenta descansar."},{t:"Sinal 3: você cansa mais em casa do que fora ⚠️",c:"O espaço que deveria recarregar está drenando."},{t:"Sinal 4: você dorme mal sem motivo aparente ⚠️",c:"Quarto com iluminação errada ou sem setorização cognitiva pode prejudicar o sono."},{t:"Sinal 5: você sente agonia em certos cômodos ⚠️",c:"Essa agonia é o sistema nervoso sinalizando que o ambiente não foi projetado para você."},{t:"Sinal 6: você nunca se sente em casa na sua própria casa ⚠️",c:"A sensação mais silenciosa de todas. A casa é sua - mas não parece."},{t:"Agora me fala: você reconhece algum desses sinais? Me conta nos comentários! 👇",c:""}]},
  {num:"C17",sem:"Semana 6",funil:"MEIO",cat:"DESEJO",dia:"Sábado",titulo:"O que as casas mais acolhedoras têm em comum",sub:"Não é o preço nem o tamanho. É uma combinação que o cérebro reconhece como acolhimento.",slides:[{t:"O que faz uma casa ser acolhedora de verdade?",c:"Não é o preço. É o projeto."},{t:"Luz quente e direcionada ✅",c:"Não o plafon central frio. Luminárias que criam zonas de calor."},{t:"Elementos naturais com presença real ✅",c:"Planta de folhagem generosa, madeira aparente, pedra natural."},{t:"Textura variada e coerente ✅",c:"Mistura de materiais diferentes que cria profundidade visual."},{t:"Organização intencional ✅",c:"O que está à vista foi escolhido."},{t:"Elemento de identidade pessoal ✅",c:"Algo que conta quem mora ali. Um objeto, uma cor, um material único."},{t:"Escala humana nos móveis ✅",c:"Móveis na proporção do corpo humano, que convidam ao uso real."},{t:"Agora me fala: qual desses elementos você mais sente falta na sua casa? Me conta nos comentários! 👇",c:""}]},
  {num:"C18",sem:"Semana 6",funil:"FUNDO",cat:"AUTORIDADE",dia:"Terça",titulo:"12 perguntas que faço antes de qualquer projeto",sub:"Não sobre cor. Não sobre estilo. Sobre quem você é.",slides:[{t:"As 12 perguntas que faço antes de desenhar uma parede:",c:"Nenhuma delas é sobre cor favorita. Todas são sobre quem você é."},{t:"1. Como você usa cada cômodo na prática?",c:"Não como você acha que deveria usar. Como você usa de verdade."},{t:"2. Em que horário você está em cada espaço?",c:"A luz que entra às 7h é diferente da que entra às 19h."},{t:"3. O que mais te cansa no espaço atual?",c:"A resposta quase sempre revela onde está o problema de verdade."},{t:"4. O que você evita em casa?",c:"Espaços que você evita são espaços que não foram projetados para você."},{t:"5. Qual memória afetiva você quer trazer para esse espaço?",c:"Design afetivo: o lar carrega a história de quem mora."},{t:"6. O que você não abre mão de sentir em casa?",c:"Não o que você quer ter. O que você precisa sentir."},{t:"Agora me fala: qual dessas perguntas te fez pensar em algo novo? Me conta nos comentários! 👇",c:""}]},
  {num:"C19",sem:"Semana 7",funil:"TOPO",cat:"DOR",dia:"Quinta",titulo:"Mitos sobre decoração que estão te custando caro",sub:"Coisas que todo mundo repete como verdade absoluta. A maioria é mito.",slides:[{t:"Mitos de decoração que custam caro!",c:"Tem coisas que circulam como verdade no mundo da decoração e que, na prática, jogam dinheiro fora."},{t:"Mito 1: casa pequena não compensa projeto ❌",c:"Metro quadrado não define qualidade de vida. Intenção define."},{t:"Mito 2: cor neutra é sempre segura ❌",c:"Branco, bege e cinza em tudo. Resultado: espaço seguro e sem alma."},{t:"Mito 3: comprar peça cara resolve ❌",c:"Peça cara no lugar errado é peça cara no lugar errado."},{t:"Mito 4: menos é sempre mais ❌",c:"Minimalismo funciona para algumas pessoas. Para outras, espaço vazio cria ansiedade."},{t:"Mito 5: Pinterest te ajuda a descobrir o que você quer ❌",c:"Pinterest te mostra o que outras pessoas quiseram."},{t:"Mito 6: arquiteto vai fazer o que ele quer ❌",c:"Arquiteto que trabalha com neuroarquitetura começa pela escuta."},{t:"Agora me fala: qual desses mitos você já acreditou? Me conta nos comentários! 👇",c:""}]},
  {num:"C20",sem:"Semana 7",funil:"MEIO",cat:"DESEJO",dia:"Sábado",titulo:"Paletas de cor que funcionam para quem quer calor sem reforma",sub:"Você não precisa trocar o piso nem pintar as paredes.",slides:[{t:"Como dar calor à casa sem reformar:",c:"Piso frio, paredes brancas. A maioria pode ser transformada sem uma obra."},{t:"A lógica: criar temperatura visual sobre o acabamento frio ✅",c:"O piso e a parede ficam. O que muda é tudo que entra como elemento móvel."},{t:"Tons que funcionam sobre porcelanato cinza ✅",c:"Caramelo, terracota apagado, ocre, ferrugem suave."},{t:"Verdes que funcionam ✅",c:"Verde seco, verde musgo, verde oliva."},{t:"Bege que funciona ✅⚠️",c:"Não o bege frio acinzentado. O bege com subtom amarelado, quase creme."},{t:"Madeira: aquece sempre ✅",c:"Clara ou escura. É impossível colocar madeira num espaço e ele não ficar mais acolhedor."},{t:"A paleta 3 foi a favorita aqui ✅",c:"Terra + verde + madeira. Essa combinação apareceu em todos os comentários."},{t:"Agora me fala: qual desses elementos você ainda não tem em casa? Me conta nos comentários! 👇",c:""}]},
  {num:"C21",sem:"Semana 7",funil:"FUNDO",cat:"AUTORIDADE",dia:"Terça",titulo:"O que a neuroarquitetura faz que a decoração não faz",sub:"Não é sobre estilo. É sobre uma abordagem diferente que começa antes de tudo.",slides:[{t:"O que diferencia neuroarquitetura de decoração?",c:"Não é o resultado visual. É o processo."},{t:"Decoração começa pela estética ❌",c:"Primeiro vem o estilo. O espaço é construído de fora para dentro."},{t:"Neuroarquitetura começa pela pessoa ✅",c:"Primeiro vem a escuta: quem é essa pessoa? Como ela vive?"},{t:"Decoração entrega espaço bonito ❌✅",c:"Pode ser absolutamente lindo. Mas pode ser bonito para qualquer pessoa."},{t:"Neuroarquitetura entrega lar com identidade ✅",c:"O espaço que você entra e reconhece como seu."},{t:"Decoração pode ser copiada ❌",c:"Uma paleta, um estilo, uma tendência: qualquer profissional pode replicar."},{t:"Neuroarquitetura não pode ser copiada ✅",c:"Porque começa por quem você é. E você não pode ser copiada."},{t:"Agora me fala: você já teve um projeto onde sentiu que foi realmente ouvida? Me conta nos comentários! 👇",c:""}]},
  {num:"C22",sem:"Semana 8",funil:"TOPO",cat:"DOR",dia:"Quinta",titulo:"Por que sua casa não te dá paz",sub:"Você vive em casa mas não descansa nela.",slides:[{t:"Por que você não descansa em casa?",c:"Você sai de um dia longo. Chega em casa. E a cabeça continua acelerada."},{t:"Excesso visual drena energia ⚠️",c:"O cérebro processa tudo o que está à vista."},{t:"Iluminação fria ativa modo de alerta ⚠️",c:"Luz acima de 4000K sinaliza ao cérebro que é hora de trabalhar."},{t:"Ausência de natureza aumenta artificialidade ⚠️",c:"Sem plantas, sem madeira, o sistema nervoso responde com inquietação."},{t:"Quarto sem setorização confunde o cérebro ⚠️",c:"Quando você trabalha e dorme no mesmo espaço, o cérebro não aprende que ali é lugar de descanso."},{t:"Casa sem identidade não acolhe ⚠️",c:"O espaço que poderia ser de qualquer pessoa não tem como acolher você especificamente."},{t:"A boa notícia: tudo isso tem solução ✅",c:"Começa com entender o que está errado - e por quê."},{t:"Agora me fala: qual desses pontos mais se parece com o que você vive em casa? Me conta nos comentários! 👇",c:""}]},
  {num:"C23",sem:"Semana 8",funil:"MEIO",cat:"DESEJO",dia:"Sábado",titulo:"Como criar seu espaço de refúgio em casa",sub:"Todo mundo precisa de um lugar só seu.",slides:[{t:"Você tem um espaço só seu em casa?",c:"Um espaço que é completamente seu. Que recarrega."},{t:"Defina o propósito do espaço primeiro ✅",c:"Descanso, leitura, meditação, trabalho criativo? O propósito define tudo."},{t:"Iluminação específica para esse propósito ✅",c:"Leitura: luz direcional. Descanso: luz quente e baixa."},{t:"Um elemento de identidade obrigatório ✅",c:"Algo que quando você vê, você pensa: isso é meu."},{t:"Textura que você ama tocar ✅",c:"O espaço de refúgio precisa ter material que convide ao toque."},{t:"Organização que permite o uso real ✅",c:"O espaço precisa estar pronto para usar."},{t:"Acústica: som ou silêncio intencional ✅",c:"O que você precisa ouvir (ou não ouvir) no seu espaço de refúgio?"},{t:"Agora me fala: você tem um espaço assim em casa? Me conta nos comentários! 👇",c:""}]},
  {num:"C24",sem:"Semana 8",funil:"FUNDO",cat:"AUTORIDADE",dia:"Terça",titulo:"O que acontece depois da reunião de descoberta",sub:"Muita gente não sabe o que esperar. Vou mostrar etapa por etapa.",slides:[{t:"O que acontece depois que você me chama?",c:"Vou mostrar etapa por etapa - sem mistério."},{t:"Etapa 1: Reunião de Descoberta",c:"Uma conversa profunda antes de qualquer decisão técnica."},{t:"Etapa 2: Diagnóstico do espaço atual",c:"Analiso o espaço atual: o que está gerando desconforto."},{t:"Etapa 3: Projeto de identidade",c:"Aqui entram as decisões técnicas - todas a serviço da sua identidade."},{t:"Etapa 4: Apresentação e ajustes",c:"Você vê o projeto antes de qualquer execução. Revisões são parte do processo."},{t:"Etapa 5: Execução (com ou sem acompanhamento)",c:"Com acompanhamento, as decisões de obra são tomadas com critério."},{t:"Etapa 6: A entrega",c:"Não é entrega de projeto - é entrega de lar."},{t:"Agora me fala: qual etapa te gerou mais curiosidade? Me chama nos comentários! 👇",c:""}]},
  {num:"C25",sem:"Semana 9",funil:"TOPO",cat:"DOR",dia:"Quinta",titulo:"Coisas que a casa certa resolve sem você perceber",sub:"Quando o ambiente está bem projetado, ele trabalha pra você em silêncio.",slides:[{t:"O que a casa certa resolve sem você perceber:",c:"Tem coisas que o ambiente resolve silenciosamente quando foi bem projetado."},{t:"Resolve: qualidade do sono ✅",c:"Quarto com iluminação quente e setorização cognitiva melhora o sono."},{t:"Resolve: ansiedade crônica ✅",c:"Espaço com menos excesso visual e organização intencional reduz cortisol."},{t:"Resolve: conflito familiar ✅",c:"Espaço bem setorizado reduz a sensação de invasão de territórios."},{t:"Resolve: produtividade ✅",c:"Área de trabalho com iluminação adequada reduz fadiga cognitiva."},{t:"Resolve: disposição para receber ✅",c:"Quando a casa parece sua, você para de adiar receber pessoas."},{t:"Resolve: relação com o lar ✅",c:"Quando você entra em casa e sente que chegou - sua relação com a vida inteira muda."},{t:"Agora me fala: qual desses você mais precisa resolver agora? Me conta nos comentários! 👇",c:""}]},
  {num:"C26",sem:"Semana 9",funil:"MEIO",cat:"DESEJO",dia:"Sábado",titulo:"A casa que te abraça quando você chega",sub:"Você já sabe como é entrar num espaço e querer ficar. Isso pode acontecer toda vez.",slides:[{t:"Como é entrar numa casa que te abraça?",c:"Você já sentiu. Num hotel, na casa de alguém, num café."},{t:"Começa pela luz ✅",c:"Luz quente que te recebe. Uma iluminação que comunica: pode descansar."},{t:"Passa pela textura ✅",c:"A superfície que você toca quando entra."},{t:"Passa pelo cheiro ✅",c:"O cheiro do espaço que é seu. Madeira, planta, tecido natural."},{t:"Passa pelo visual ✅",c:"Um elemento de identidade. Iluminação que convida."},{t:"Chega na sensação ✅",c:"Quando todos esses elementos estão certos, você só sente o corpo soltar."},{t:"Isso não é utopia ✅",c:"É o resultado de um processo que começa com escuta. É possível."},{t:"Agora me fala: quando foi a última vez que você sentiu isso ao entrar em algum lugar? Me conta nos comentários! 👇",c:""}]},
  {num:"C27",sem:"Semana 9",funil:"FUNDO",cat:"AUTORIDADE",dia:"Terça",titulo:"Perguntas que você deve fazer antes de contratar um arquiteto",sub:"Para entender se o processo dele começa por você - ou começa pelo projeto.",slides:[{t:"Perguntas que você deve fazer antes de contratar:",c:"Para entender se o processo dele começa por você ou pelo projeto."},{t:"1. Como você começa um projeto? ✅",c:"Se ele começa com perguntas sobre você, ele começa pelo humano."},{t:"2. Você adapta o projeto para minha rotina? ✅",c:"Projeto que não considera como você vive vai criar espaço bonito para uma pessoa fictícia."},{t:"3. Como funcionam as revisões? ✅",c:"Revisão não é exceção - é parte do processo."},{t:"4. Você já trabalhou com casas do meu porte? ✅",c:"Neuroarquitetura não é só para casa grande."},{t:"5. O que você entrega além do projeto técnico? ✅",c:"Identidade, diretrizes de execução, acompanhamento?"},{t:"6. Como você lida quando o cliente não sabe o que quer? ✅",c:"O processo de descoberta existe exatamente para isso."},{t:"Agora me fala: qual dessas perguntas você nunca pensou em fazer? Me conta nos comentários! 👇",c:""}]},
  {num:"C28",sem:"Semana 10",funil:"TOPO",cat:"DOR",dia:"Quinta",titulo:"Por que você mora numa casa que não parece sua",sub:"Não é falta de gosto. Não é falta de dinheiro.",slides:[{t:"Por que sua casa não parece sua?",c:"O problema nunca foi o que você escolheu - foi como o processo começou."},{t:"Porque começou pela estética ❌",c:"Nenhuma das escolhas foi precedida de uma pergunta sobre quem você é."},{t:"Porque alguém escolheu por você ❌",c:"O arquiteto que fez o que ele queria."},{t:"Porque você não sabia o que queria ❌",c:"E ninguém perguntou de forma profunda."},{t:"Porque tendência substituiu identidade ❌",c:"Tendência tem data de validade. Identidade não."},{t:"Porque o espaço foi feito para impressionar, não para cuidar ❌",c:"Casa que cuida foi projetada para o sistema nervoso de quem vive ali."},{t:"A solução não começa por uma reforma ✅",c:"Começa por uma pergunta: quem sou eu dentro desse espaço?"},{t:"Agora me fala: qual desses motivos mais se parece com o que aconteceu com você? Me conta nos comentários! 👇",c:""}]},
  {num:"C29",sem:"Semana 10",funil:"MEIO",cat:"DESEJO",dia:"Sábado",titulo:"Como seria sua vida se você amasse o espaço onde vive",sub:"Não é sobre a casa. É sobre como você se sente nela.",slides:[{t:"Como seria sua vida se você amasse sua casa?",c:"É uma experiência real que muda a relação com a vida inteira."},{t:"Você pararia de querer sair ✅",c:"Quando o espaço te acolhe, você para de planejar a próxima saída."},{t:"Você descansaria de verdade ✅",c:"O ambiente desliga mais rápido e descansa mais fundo."},{t:"Você receberia as pessoas com orgulho ✅",c:"Não o orgulho de mostrar - o orgulho de compartilhar."},{t:"Seus filhos teriam espaço para ser quem são ✅",c:"Crianças que crescem em espaços intencionais aprendem a habitar o mundo com mais segurança."},{t:"Você trabalharia melhor e descansaria mais ✅",c:"Espaço certo para trabalho + espaço certo para descanso = equilíbrio."},{t:"Você se reconheceria no espaço ✅",c:"Aquela sensação de entrar em casa e pensar: isso é meu."},{t:"Agora me fala: qual dessas mudanças você mais quer sentir? Me conta aqui nos comentários! 👇",c:""}]},
  {num:"C30",sem:"Semana 10",funil:"FUNDO",cat:"AUTORIDADE",dia:"Terça",titulo:"Tudo que você precisa saber antes de começar",sub:"Antes de qualquer decisão de projeto, existem coisas que valem mais que qualquer dica.",slides:[{t:"Antes de começar qualquer projeto, você precisa saber:",c:"Sobre o processo que antecede qualquer decisão técnica."},{t:"Identidade antes de estética ✅",c:"A primeira decisão de qualquer projeto não é de cor ou material. É: quem é essa pessoa?"},{t:"Diagnóstico antes de solução ✅",c:"Antes de reformar, entender o que está errado e por quê."},{t:"Processo antes de resultado ✅",c:"Casa com identidade não é entregue - é construída."},{t:"Identidade atravessa reforma ✅",c:"Material envelhece. Tendência passa. Identidade fica."},{t:"Escuta é o diferencial ✅",c:"A diferença entre projeto bonito e lar que cuida está na escuta."},{t:"Começar é a parte mais importante ✅",c:"A conversa que antecede tudo. Uma reunião de descoberta pode mudar como você enxerga o espaço onde vive."},{t:"Agora me fala: você está pronta para ter uma casa que cuida de você? Me chama aqui! 👇",c:""}]},
];

const todos=[
  ...reels.map(r=>({...r,tipo:"REELS",nome:r.nome})),
  ...carrosseis.map(c=>({...c,tipo:"CARROSSEL",nome:c.titulo}))
];

let etiquetas=Object.fromEntries(todos.map(t=>[t.num,["Aguardando"]]));
let expandido={};

function filtrar(){
  const tipo=document.getElementById("f-tipo").value;
  const funil=document.getElementById("f-funil").value;
  const cat=document.getElementById("f-cat").value;
  const etiq=document.getElementById("f-etiqueta").value;
  return todos.filter(t=>{
    if(tipo && t.tipo!==tipo) return false;
    if(funil && t.funil!==funil) return false;
    if(cat && t.cat!==cat) return false;
    if(etiq && !etiquetas[t.num].includes(etiq)) return false;
    return true;
  });
}

function limpar(){
  ["f-tipo","f-funil","f-cat","f-etiqueta"].forEach(id=>document.getElementById(id).value="");
  renderizar();
}

function toggleEtiqueta(num,etiq){
  const arr=etiquetas[num];
  const idx=arr.indexOf(etiq);
  if(idx>-1) arr.splice(idx,1); else arr.push(etiq);
  etiquetas[num]=arr;
  renderizar();
}

function toggleExpand(num){
  expandido[num]=!expandido[num];
  renderizar();
}

function renderizar(){
  const vis=filtrar();
  document.getElementById("contador").textContent=vis.length+" conteúdos";
  const grid=document.getElementById("grid");
  if(!vis.length){grid.innerHTML='<div class="sem-resultados">Nenhum conteúdo com esses filtros.</div>';return;}
  grid.innerHTML=vis.map(t=>{
    const etiqArr=etiquetas[t.num];
    const exp=expandido[t.num];
    const isReel=t.tipo==="REELS";
    const etiqPills=etiqArr.map(e=>{const[bg,fc]=etiquetaCores[e];return`<span class="badge" style="background:${bg};color:${fc};cursor:pointer;border:0.5px solid ${fc}40;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600" onclick="toggleEtiqueta('${t.num}','${e}')">${e} ×</span>`;}).join("");
    const etiqSel=etiquetaOpts.map(e=>{const ativo=etiqArr.includes(e);const[bg,fc,bd]=etiquetaCores[e];return`<span class="etiq-pill" style="background:${ativo?bg:'transparent'};color:${ativo?fc:'#999'};border-color:${ativo?bd:'#ddd'}" onclick="toggleEtiqueta('${t.num}','${e}')">${e}</span>`;}).join("");
    let corpo="";
    if(exp){
      if(isReel){
        corpo=`<div style="height:0.5px;background:#e0e0da;margin:10px 0"></div>
        <div class="campo"><div class="campo-label">Headline</div><div class="campo-valor">${t.headline}</div></div>
        <div class="campo"><div class="campo-label">Gancho</div><div class="campo-valor gancho">${t.gancho}</div></div>
        <div class="campo"><div class="campo-label">Conteúdo</div><ul class="lista-conteudo">${t.conteudo.map(c=>`<li>${c}</li>`).join("")}</ul></div>
        <div class="campo"><div class="campo-label">CTA</div><div class="campo-valor cta">${t.cta}</div></div>
        <div style="height:0.5px;background:#e0e0da;margin:10px 0"></div>
        <div class="campo"><div class="campo-label">Etiquetas</div><div class="etiq-wrap">${etiqSel}</div></div>`;
      }else{
        const sh=t.slides.map((s,i)=>`<div class="slide-item"><div class="slide-num">Slide ${i+1}/${t.slides.length}</div><div class="slide-titulo">${s.t}</div>${s.c?`<div class="slide-corpo">${s.c}</div>`:""}</div>`).join("");
        corpo=`<div style="height:0.5px;background:#e0e0da;margin:10px 0"></div>
        <div class="campo"><div class="campo-label">Subtítulo (Slide 1)</div><div class="campo-valor gancho">${t.sub}</div></div>
        <div class="campo"><div class="campo-label">Slides</div><div class="slides-wrap">${sh}</div></div>
        <div style="height:0.5px;background:#e0e0da;margin:10px 0"></div>
        <div class="campo"><div class="campo-label">Etiquetas</div><div class="etiq-wrap">${etiqSel}</div></div>`;
      }
    }
    return`<div class="card">
      <div class="card-header">
        <span class="num">${isReel?"🎬":"📋"} ${t.num}</span>
        <span class="titulo">${t.nome}</span>
        <div class="badges">
          <span class="badge badge-tipo-${t.tipo}">${t.tipo}</span>
          <span class="badge badge-funil-${t.funil}">${t.funil}</span>
          <span class="badge badge-cat-${t.cat}">${t.cat}</span>
          <span style="font-size:11px;color:#aaa">${t.sem}</span>
          ${etiqPills}
          <button class="toggle-btn" onclick="toggleExpand('${t.num}')">${exp?"Fechar":"Ver copy"}</button>
        </div>
      </div>
      ${exp?`<div class="card-body">${corpo}</div>`:""}
    </div>`;
  }).join("");
}

["f-tipo","f-funil","f-cat","f-etiqueta"].forEach(id=>document.getElementById(id).addEventListener("change",renderizar));
renderizar();
</script>
</body>
